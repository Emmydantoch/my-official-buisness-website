<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — Realcloud</title>
    <link rel="stylesheet" href="assets/css/vars.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="stylesheet" href="assets/css/index.css" />
    <style>
    /* Base styles */
    :root {
        --primary-color: #3498db;
        --primary-hover: #2980b9;
        --text-light: #ffffff;
        --text-muted: #b3b3b3;
        --bg-dark: #1a1a1a;
        --bg-darker: #0d0d0d;
        --border-color: #333;
        --transition: all 0.3s ease;
    }
    /* Contact Section */
    .contact-container {
        max-width: 800px;
        margin: 4rem auto;
        padding: 3rem;
        background: linear-gradient(145deg, #1a1a1a, #262626);
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .contact-container::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(52, 152, 219, 0.1) 0%, transparent 70%);
        z-index: 1;
        pointer-events: none;
    }
    .form-title {
        color: var(--text-light);
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 2.5rem;
        text-align: center;
        position: relative;
        z-index: 2;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .form-title::after {
        content: '';
        display: block;
        width: 80px;
        height: 4px;
        background: var(--primary-color);
        margin: 1rem auto 0;
        border-radius: 2px;
    }
    /* Form Styles */
    .form-group {
        margin-bottom: 2rem;
        position: relative;
        z-index: 2;
    }
    .form-control {
        width: 100%;
        padding: 1.2rem 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: 10px;
        color: var(--text-light);
        font-size: 1rem;
        transition: var(--transition);
        backdrop-filter: blur(5px);
    }
    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.3);
        outline: none;
        background: rgba(255, 255, 255, 0.08);
    }
    .form-control::placeholder {
        color: var(--text-muted);
    }
    textarea.form-control {
        min-height: 180px;
        resize: vertical;
    }
    /* Submit Button */
    .submit-btn {
        background: var(--primary-color);
        color: white;
        border: none;
        padding: 1.2rem 3rem;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
        z-index: 2;
    }
    .submit-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(45deg, var(--primary-color), #2ecc71);
        z-index: -1;
        transition: transform 0.5s ease;
        transform: scaleX(0);
        transform-origin: right;
    }
    .submit-btn:hover::before {
        transform: scaleX(1);
        transform-origin: left;
    }
    .submit-btn span {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    .submit-btn:active {
        transform: translateY(-1px);
    }
    /* Success Message */
    .success-message {
        display: none;
        background: rgba(46, 204, 113, 0.9);
        color: white;
        padding: 1.2rem;
        border-radius: 8px;
        margin-top: 2rem;
        text-align: center;
        animation: fadeIn 0.5s ease;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    /* Footer Styles */
    .site-footer {
        background: linear-gradient(to right, #0f0f0f, #1a1a1a);
        color: var(--text-light);
        padding: 4rem 0 2rem;
        position: relative;
        overflow: hidden;
    }
    .site-footer::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
    }
    .footer-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
    }
    .footer-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 3rem;
        margin-bottom: 3rem;
    }
    .footer-col h4 {
        color: var(--text-light);
        font-size: 1.3rem;
        margin-bottom: 1.5rem;
        position: relative;
        padding-bottom: 10px;
    }
    .footer-col h4::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: 0;
        width: 50px;
        height: 2px;
        background: var(--primary-color);
    }
    .footer-col p, 
    .footer-col a {
        color: var(--text-muted);
        margin-bottom: 0.8rem;
        display: block;
        transition: var(--transition);
        text-decoration: none;
    }
    .footer-col a:hover {
        color: var(--primary-color);
        padding-left: 5px;
    }
    .footer-bottom {
        text-align: center;
        padding-top: 2rem;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
        font-size: 0.9rem;
    }
    .social-links {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
    }
    .social-links a {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 50%;
        transition: var(--transition);
    }
    .social-links a:hover {
        background: var(--primary-color);
        transform: translateY(-3px);
    }
    /* Responsive Design */
    @media (max-width: 768px) {
        .contact-container {
            margin: 2rem 1rem;
            padding: 2rem 1.5rem;
        }
        .form-title {
            font-size: 2rem;
        }
        .footer-grid {
            grid-template-columns: 1fr;
            gap: 2rem;
        }
    }
    /* Animation for form elements */
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .form-group {
        animation: slideUp 0.5s ease-out;
        animation-fill-mode: both;
    }
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group:nth-child(3) { animation-delay: 0.3s; }
    .submit-btn { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <div class="logo-container">
                <img src="images/RC LOGO.jpg" alt="Realcloud logo" />
                <h1 class="site-name">Realcloud Institute</h1>
            </div>
            <nav class="main-nav">
                <button class="menu-toggle" aria-label="Toggle menu">☰</button>
                <div class="navlinks">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="service.html">Services</a>
                    <a href="contact.html" class="active">Contact</a>
                </div>
            </nav>
        </div>
    </header>

    <main class="contact-container">
        <h2 class="form-title">Get In Touch</h2>
        
        <form id="contactForm" action="https://formspree.io/f/mpqqqblr" method="POST">
            <div class="form-group">
                <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
            </div>
            
            <div class="form-group">
                <input type="email" id="email" name="email" class="form-control" placeholder="Your Email" required>
            </div>
            
            <div class="form-group">
                <textarea id="message" name="message" class="form-control" placeholder="Your Message" required></textarea>
            </div>
            
            <button type="submit" class="submit-btn">
                <span>Send Message</span>
            </button>
            
            <div id="successMessage" class="success-message">
                Thank you! Your message has been sent. We'll get back to you soon.
            </div>
        </form>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>Contact Us</h4>
                    <p>Email: realcloud50@gmail.com</p>
                    <p>Phone: +234 814 136-1935</p>
                </div>
                <div class="footer-col">
                    <h4>Quick Links</h4>
                    <a href="index.html">Home</a>
                    <a href="about.html">About Us</a>
                    <a href="service.html">Services</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Realcloud Institute. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Form submission with Formspree
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                const formData = new FormData(form);
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    form.reset();
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    throw new Error('Form submission failed');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('There was a problem sending your message. Please try again later.');
            }
        });
        
        // Mobile menu toggle
        const menuToggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.navlinks');
        
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.style.display = navLinks.style.display === 'flex' ? 'none' : 'flex';
            });
        }
    </script>
</body>
</html>
